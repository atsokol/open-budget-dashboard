# OpenBudget Dashboard Configuration
# Budget category definitions and visualization settings

# ── Financial Summary categories (R: "Open Budget category for update.xlsx") ──
# Ordered break-end ranges — equivalent to R cut()
summary_income_categories:
  - {name: "Tax",              breakEnd: 19999999}
  - {name: "Non-tax",          breakEnd: 21010499}
  - {name: "Capital revenues", breakEnd: 21010599}
  - {name: "Non-tax",          breakEnd: 21010699}
  - {name: "Capital revenues", breakEnd: 21011199}
  - {name: "Non-tax",          breakEnd: 21049999}
  - {name: "Capital revenues", breakEnd: 21050001}
  - {name: "Non-tax",          breakEnd: 24109999}
  - {name: "Capital revenues", breakEnd: 24119999}
  - {name: "Non-tax",          breakEnd: 29999999}
  - {name: "Capital revenues", breakEnd: 39999999}
  - {name: "Transfers",        breakEnd: 41999999}
  - {name: "Capital revenues", breakEnd: 42999999}
  - {name: "Transfers",        breakEnd: 49999999}

summary_expense_categories:
  - {name: "Opex",     breakEnd: 2199}
  - {name: "Opex",     breakEnd: 2249}
  - {name: "Opex",     breakEnd: 2269}
  - {name: "Opex",     breakEnd: 2279}
  - {name: "Capex",    breakEnd: 2281}
  - {name: "Opex",     breakEnd: 2399}
  - {name: "Interest", breakEnd: 2599}
  - {name: "Opex",     breakEnd: 2619}
  - {name: "Opex",     breakEnd: 2699}
  - {name: "Opex",     breakEnd: 2799}
  - {name: "Opex",     breakEnd: 2999}
  - {name: "Capex",    breakEnd: 3199}
  - {name: "Capex",    breakEnd: 3219}
  - {name: "Capex",    breakEnd: 8999}
  - {name: "Opex",     breakEnd: 9999}

