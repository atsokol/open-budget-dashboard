  - {name: "Other Non-Tax Revenues",            breakEnd: 21010699}
  - {name: "Interest received",                 breakEnd: 21011199}
  - {name: "Other Non-Tax Revenues",            breakEnd: 21049999}
  - {name: "Interest received",                 breakEnd: 21050001}
  - {name: "Other Non-Tax Revenues",            breakEnd: 24109999}
  - {name: "Interest received",                 breakEnd: 24119999}
  - {name: "Other Non-Tax Revenues",            breakEnd: 29999999}
  - {name: "Sale of assets",                    breakEnd: 39999999}
  - {name: "Transfers",                         breakEnd: 41999999}
