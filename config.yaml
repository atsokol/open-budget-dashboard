# OpenBudget Dashboard Configuration
# Budget category definitions and visualization settings

# ── Financial Model categories ──
# Single hierarchical source of truth. Each entry carries:
#   name     — model-level (detailed) category name
#   breakEnd — upper code boundary for the ordered range scan (equivalent to R cut())
#   parent   — summary-level category (derived summary lists are computed from these)
# NOTE: Non-tax and Capital revenues are interleaved in code space — the global ordering
#       of breakEnd values must be preserved; hierarchy is expressed via parent, not nesting.
model_income_categories:
  - {name: "Personal income tax",               breakEnd: 11019999, parent: "Tax revenues"}
  - {name: "Other tax revenues",                breakEnd: 13999999, parent: "Tax revenues"}
  - {name: "Internal goods and services taxes", breakEnd: 14999999, parent: "Tax revenues"}
  - {name: "Other tax revenues",                breakEnd: 18049999, parent: "Tax revenues"}
  - {name: "Unified income tax",                breakEnd: 18059999, parent: "Tax revenues"}
  - {name: "Other tax revenues",                breakEnd: 19999999, parent: "Tax revenues"}
  - {name: "Other non-tax revenues",            breakEnd: 21010499, parent: "Non-tax revenues"}
  - {name: "Interest received",                 breakEnd: 21010599, parent: "Interest received",      grandparent: "Capital revenues"}  # capital interest
  - {name: "Other non-tax revenues",            breakEnd: 21010699, parent: "Non-tax revenues"}
  - {name: "Interest received",                 breakEnd: 21011199, parent: "Interest received",      grandparent: "Capital revenues"}  # capital interest
  - {name: "Other non-tax revenues",            breakEnd: 21049999, parent: "Non-tax revenues"}
  - {name: "Interest received",                 breakEnd: 21050001, parent: "Interest received",      grandparent: "Capital revenues"}  # capital interest
  - {name: "Other non-tax revenues",            breakEnd: 24109999, parent: "Non-tax revenues"}
  - {name: "Interest received",                 breakEnd: 24119999, parent: "Interest received",      grandparent: "Capital revenues"}  # capital interest
  - {name: "Other non-tax revenues",            breakEnd: 29999999, parent: "Non-tax revenues"}
  - {name: "Sale of assets",                    breakEnd: 39999999, parent: "Sale of assets",         grandparent: "Capital revenues"}
  - {name: "Transfers",                         breakEnd: 41999999, parent: "Transfers"}
  - {name: "Capital grants",                    breakEnd: 42999999, parent: "Other capital revenues", grandparent: "Capital revenues"}
  - {name: "Transfers",                         breakEnd: 49999999, parent: "Transfers"}
  - {name: "Other non-tax revenues",            breakEnd: 59999999, parent: "Non-tax revenues"}  # Цільові фонди (codes 50000000+)

model_expense_categories:
  - {name: "Staff Costs",                       breakEnd: 2199,  parent: "Operating expenditures"}
  - {name: "Purchase of materials",             breakEnd: 2249,  parent: "Operating expenditures"}
  - {name: "Current discretionary expenditure", breakEnd: 2269,  parent: "Operating expenditures"}
  - {name: "Utility payments",                  breakEnd: 2279,  parent: "Operating expenditures"}
  - {name: "Capital expenditures",              breakEnd: 2281,  parent: "Capital expenditures"}
  - {name: "Current discretionary expenditure", breakEnd: 2399,  parent: "Operating expenditures"}
  - {name: "Interest paid",                     breakEnd: 2599,  parent: "Interest paid"}
  - {name: "Transfer to legal entities",        breakEnd: 2619,  parent: "Operating expenditures"}
  - {name: "Transfers to other budgets",        breakEnd: 2699,  parent: "Operating expenditures"}
  - {name: "Transfer to residents",             breakEnd: 2799,  parent: "Operating expenditures"}
  - {name: "Current discretionary expenditure", breakEnd: 2999,  parent: "Operating expenditures"}
  - {name: "Capital expenditures",              breakEnd: 3199,  parent: "Capital expenditures"}
  - {name: "Capital transfers (equity)",        breakEnd: 3219,  parent: "Capital expenditures"}
  - {name: "Capital transfers (budget)",        breakEnd: 8999,  parent: "Capital expenditures"}
  - {name: "Current discretionary expenditure", breakEnd: 9999,  parent: "Operating expenditures"}

# ── Financing / cash code mappings (from debts dataset) ──
financing_codes:
  401000: "New Borrowings"
  402000: "Debt Repayments"
  601000: "Deposit operations"
  602300: "Interbudget loans"

cash_codes:
  602100: "Cash, bop"
  602200: "Cash, eop"

# ── Financial Summary row order and derived totals ──
summary_totals:
  - {name: "Current revenues",            components: ["Tax revenues", "Non-tax revenues", "Transfers"]}
  - {name: "Operating surplus",           components: ["Current revenues", "Operating expenditures"]}
  - {name: "Current surplus",             components: ["Operating surplus", "Interest paid"]}
  - {name: "Capital revenues",             components: ["Interest received", "Sale of assets", "Other capital revenues"]}
  - {name: "Capital surplus",             components: ["Capital revenues", "Capital expenditures"]}
  - {name: "Net surplus before financing", components: ["Capital surplus", "Current surplus"]}
  - {name: "Net debt",                    components: ["New Borrowings", "Debt Repayments"]}
  - {name: "Net surplus",                 components: ["Net surplus before financing", "Net debt", "Budget loans balance"]}

summary_row_order:
  - "Tax revenues"
  - "Non-tax revenues"
  - "Transfers"
  - "Current revenues"
  - "Operating expenditures"
  - "Operating surplus"
  - "Interest paid"
  - "Current surplus"
  - "Interest received"
  - "Sale of assets"
  - "Other capital revenues"
  - "Capital revenues"
  - "Capital expenditures"
  - "Net surplus before financing"
  - "New Borrowings"
  - "Debt Repayments"
  - "Budget loans balance"
  - "Net surplus"
  - "Interbudget loans"
  - "Deposit operations"
  - "Cash, bop"
  - "Cash, eop"
  - "Reverse subsidy"

reverse_subsidy_fkv_code: 180

# Chart color schemes
colors:
  sequential: ["#f7fbff", "#deebf7", "#c6dbef", "#9ecae1", "#6baed6", "#4292c6", "#2171b5", "#08519c", "#08306b"]
  categorical: ["#4682b4", "#2e8b57", "#ff8c00", "#9370db", "#4169e1", "#dc143c", "#ff6347", "#ffd700", "#20b2aa"]
  positive: "#2e8b57"
  negative: "#dc143c"
