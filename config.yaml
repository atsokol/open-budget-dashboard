# Revenue categories (based on income codes)
revenue_categories:
  - name: "Tax revenues"
    codes: [0, 19999999]
    color: "#4682b4"
    type: "range"
  - name: "Non-tax revenues"
    codes: 
      - [20000000, 21010499]
      - [21010600, 21010699]
      - [21011200, 21049999]
      - [21050002, 24109999]
      - [24120000, 29999999]
      - [50000000, 59999999]
    color: "#2e8b57"
    type: "ranges"
  - name: "Capital revenues"
    codes:
      - [21010500, 21010599]
      - [21010700, 21011199]
      - [21050000, 21050001]
      - [24110000, 24119999]
      - [30000000, 39999999]
      - [42000000, 42999999]
    color: "#ff8c00"
    type: "ranges"
  - name: "Transfers"
    codes:
      - [40000000, 41999999]
      - [43000000, 49999999]
    color: "#9370db"
    type: "ranges"

# Expense categories (economic classification)
