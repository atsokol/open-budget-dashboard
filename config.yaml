  - {name: "Capital Transfers (budget)",        breakEnd: 8999}
  - {name: "Current Discretionary Expenditure", breakEnd: 9999}

# ── Financing / cash code mappings (from debts dataset) ──
financing_codes:
  401000: "New Borrowing"
  402000: "Debt Repayments"
  602300: "Interbudget loans"

cash_codes:
  602100: "Cash, bop"
  602200: "Cash, eop"

# ── Financial Summary row order and derived totals ──
summary_totals:
  - {name: "Current revenues",            components: ["Tax", "Non-tax", "Transfers"]}
  - {name: "Operating surplus",           components: ["Current revenues", "Opex"]}
  - {name: "Current surplus",             components: ["Operating surplus", "Interest"]}
  - {name: "Capital surplus",             components: ["Capital revenues", "Capex"]}
  - {name: "Net surplus before financing", components: ["Capital surplus", "Current surplus"]}
  - {name: "Net debt",                    components: ["New Borrowing", "Debt Repayments"]}
  - {name: "Net surplus",                 components: ["Net surplus before financing", "Net debt", "Budget loans balance"]}

summary_row_order:
  - "Tax"
  - "Non-tax"
  - "Transfers"
  - "Current revenues"
  - "Opex"
  - "Operating surplus"
  - "Interest"
  - "Current surplus"
  - "Capital revenues"
  - "Capex"
  - "Capital surplus"
  - "Net surplus before financing"
  - "New Borrowing"
  - "Debt Repayments"
  - "Net debt"
  - "Budget loans balance"
  - "Net surplus"
  - "Interbudget loans"
  - "Cash, bop"
  - "Cash, eop"

# Chart color schemes
colors:
  sequential: ["#f7fbff", "#deebf7", "#c6dbef", "#9ecae1", "#6baed6", "#4292c6", "#2171b5", "#08519c", "#08306b"]
  categorical: ["#4682b4", "#2e8b57", "#ff8c00", "#9370db", "#4169e1", "#dc143c", "#ff6347", "#ffd700", "#20b2aa"]
  positive: "#2e8b57"
  negative: "#dc143c"
